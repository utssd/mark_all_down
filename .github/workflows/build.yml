name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Build Linux
        run: node node_modules/electron-builder/cli.js --linux AppImage tar.gz --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.tar.gz

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Build macOS
        run: node node_modules/electron-builder/cli.js --mac dmg zip --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            dist/*.dmg
            dist/*.zip

  build-windows:
    runs-on: windows-latest
    env:
      # node-gyp on windows-latest sometimes fails `findVisualStudio()` with
      # "could not find any visual studio installation to use" even though
      # VS 2022 Build Tools are pre-installed; these hints make detection
      # deterministic for better-sqlite3 / node-pty / @xenova rebuilds.
      GYP_MSVS_VERSION: '2022'
      npm_config_msvs_version: '2022'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade node-gyp
        run: npm install --global node-gyp@latest
      - name: Install dependencies
        run: npm ci
      - name: Build Windows
        run: node node_modules/electron-builder/cli.js --win nsis zip --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.tar.gz
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          generate_release_notes: true
