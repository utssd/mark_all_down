name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Compute version
        shell: bash
        run: echo "VERSION=$(bash scripts/compute-version.sh)" >> "$GITHUB_ENV"
      - name: Build Linux
        run: node node_modules/electron-builder/cli.js --linux AppImage tar.gz --publish never --config.extraMetadata.version=${{ env.VERSION }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.tar.gz

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Compute version
        shell: bash
        run: echo "VERSION=$(bash scripts/compute-version.sh)" >> "$GITHUB_ENV"
      - name: Build macOS
        run: node node_modules/electron-builder/cli.js --mac dmg zip --publish never --config.extraMetadata.version=${{ env.VERSION }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            dist/*.dmg
            dist/*.zip

  build-windows:
    # Pin to windows-2022, not windows-latest. As of 2026 `windows-latest`
    # points at the Server-2025 image, whose VS 2022 install is missing the
    # MSVC components node-gyp's `vswhere` probe requires, so native modules
    # without a matching Electron prebuild (node-pty) fail to compile with
    # "Could not find any Visual Studio installation to use". windows-2022
    # ships a complete Desktop-development-with-C++ workload.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: npm ci
      - name: Compute version
        shell: bash
        run: echo "VERSION=$(bash scripts/compute-version.sh)" >> "$GITHUB_ENV"
      - name: Build Windows
        run: node node_modules/electron-builder/cli.js --win nsis zip --publish never --config.extraMetadata.version=${{ env.VERSION }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Delete existing release (if re-tagging)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Deleting existing release for $TAG"
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes
          else
            echo "No existing release for $TAG"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.tar.gz
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          generate_release_notes: true
